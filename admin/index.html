<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插件管理</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f7fa; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); }
    h1 { margin-top: 0; color: #1a202c; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 8px 20px; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; background: white; }
    .tab.active { background: #3182ce; color: white; border-color: #3182ce; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #edf2f7; }
    .actions { display: flex; gap: 5px; }
    button { padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .btn-add { background: #2b6cb0; color: white; margin-bottom: 15px; }
    .btn-edit { background: #38a169; color: white; }
    .btn-delete { background: #e53e3e; color: white; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 24px; border-radius: 12px; width: 400px; max-width: 90%; }
    .modal-content input { width: 100%; padding: 8px; margin: 6px 0; border: 1px solid #ccc; border-radius: 6px; }
    .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
    .logout { float: right; background: #a0aec0; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <button class="logout" onclick="logout()">退出登录</button>
    <h1>⚙️ 插件管理</h1>
    <div class="tabs">
      <div class="tab active" data-file="icecloud_plugins">IceCloud</div>
      <div class="tab" data-file="plux_plugins">Plux</div>
    </div>
    <button class="btn-add" onclick="openAddModal()">+ 添加插件</button>
    <table>
      <thead>
        <tr>
          <th>插件名称</th>
          <th>版本</th>
          <th>支持 MC</th>
          <th>发布日期</th>
          <th>下载链接</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="plugin-list"></tbody>
    </table>
  </div>

  <!-- 添加/编辑模态框 -->
  <div class="modal" id="pluginModal">
    <div class="modal-content">
      <h3 id="modalTitle">添加插件</h3>
      <input type="hidden" id="pluginIndex" value="">
      <input type="text" id="pluginTitle" placeholder="插件名称">
      <input type="text" id="pluginVersion" placeholder="版本号">
      <input type="text" id="pluginMC" placeholder="支持 MC 版本">
      <input type="text" id="pluginDate" placeholder="发布日期 (YYYY-MM-DD)">
      <input type="text" id="pluginURL" placeholder="下载链接">
      <div class="modal-buttons">
        <button onclick="closeModal()" style="background:#cbd5e0">取消</button>
        <button id="saveBtn" style="background:#2b6cb0; color:white">保存</button>
      </div>
    </div>
  </div>

  <script>
    // 检查登录
    const token = localStorage.getItem('admin_token');
    if (!token) {
      window.location.href = '/login.html';
    }

    let currentFile = 'icecloud_plugins';
    let pluginsData = [];

    // 切换标签
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentFile = e.target.dataset.file;
        loadPlugins();
      });
    });

    // 加载数据
    async function loadPlugins() {
      try {
        const res = await fetch(`/.netlify/functions/plugins?file=${currentFile}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('加载失败');
        const data = await res.json();
        pluginsData = JSON.parse(data); // 确保是数组
        renderTable();
      } catch (err) {
        alert('加载插件数据失败: ' + err.message);
      }
    }

    function renderTable() {
      const tbody = document.getElementById('plugin-list');
      tbody.innerHTML = '';
      pluginsData.forEach((plugin, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${plugin.title}</td>
          <td>${plugin.version}</td>
          <td>${plugin.mc_version}</td>
          <td>${plugin.date}</td>
          <td><a href="${plugin.download_url}" target="_blank">下载</a></td>
          <td class="actions">
            <button class="btn-edit" data-index="${index}">编辑</button>
            <button class="btn-delete" data-index="${index}">删除</button>
          </td>
        `;
        tbody.appendChild(row);
      });

      // 绑定编辑按钮
      document.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(btn.dataset.index));
      });
      // 绑定删除按钮
      document.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => deletePlugin(btn.dataset.index));
      });
    }

    // 添加
    function openAddModal() {
      document.getElementById('modalTitle').textContent = '添加插件';
      document.getElementById('pluginIndex').value = '';
      document.getElementById('pluginTitle').value = '';
      document.getElementById('pluginVersion').value = '';
      document.getElementById('pluginMC').value = '';
      document.getElementById('pluginDate').value = '';
      document.getElementById('pluginURL').value = '';
      document.getElementById('pluginModal').style.display = 'flex';
    }

    // 编辑
    function openEditModal(index) {
      const plugin = pluginsData[index];
      document.getElementById('modalTitle').textContent = '编辑插件';
      document.getElementById('pluginIndex').value = index;
      document.getElementById('pluginTitle').value = plugin.title;
      document.getElementById('pluginVersion').value = plugin.version;
      document.getElementById('pluginMC').value = plugin.mc_version;
      document.getElementById('pluginDate').value = plugin.date;
      document.getElementById('pluginURL').value = plugin.download_url;
      document.getElementById('pluginModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('pluginModal').style.display = 'none';
    }

    // 保存插件
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const index = document.getElementById('pluginIndex').value;
      const newPlugin = {
        title: document.getElementById('pluginTitle').value,
        version: document.getElementById('pluginVersion').value,
        mc_version: document.getElementById('pluginMC').value,
        date: document.getElementById('pluginDate').value,
        download_url: document.getElementById('pluginURL').value
      };

      if (index === '') {
        pluginsData.push(newPlugin);
      } else {
        pluginsData[index] = newPlugin;
      }

      // 调用 API 更新文件
      try {
        const res = await fetch(`/.netlify/functions/plugins?file=${currentFile}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(pluginsData) // 注意这里是整个数组的 JSON 字符串
        });
        if (!res.ok) throw new Error('保存失败');
        closeModal();
        renderTable();
        alert('保存成功！网站将在几秒内更新。');
      } catch (err) {
        alert('保存失败: ' + err.message);
      }
    });

    // 删除插件
    async function deletePlugin(index) {
      if (!confirm('确定删除这个插件吗？')) return;
      pluginsData.splice(index, 1);
      try {
        const res = await fetch(`/.netlify/functions/plugins?file=${currentFile}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(pluginsData)
        });
        if (!res.ok) throw new Error('删除失败');
        renderTable();
        alert('插件已删除');
      } catch (err) {
        alert('操作失败: ' + err.message);
      }
    }

    function logout() {
      localStorage.removeItem('admin_token');
      window.location.href = '/login.html';
    }

    // 初始加载
    loadPlugins();
  </script>
</body>
</html>
