<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插件管理 · IceCloud & Plux</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f7fa; margin: 0; padding: 20px; }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { color: #1a202c; margin-bottom: 0.5rem; }
    .login-box, .main-box { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); }
    .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
    .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
    .login-box button { width: 100%; padding: 10px; background: #3182ce; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 8px 20px; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; background: white; }
    .tab.active { background: #3182ce; color: white; border-color: #3182ce; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #edf2f7; }
    th { background: #f8fafc; color: #475569; font-weight: 600; font-size: 0.9rem; }
    .actions button { margin: 0 3px; padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .btn-add { background: #2b6cb0; color: white; padding: 8px 18px; border: none; border-radius: 8px; margin-bottom: 15px; cursor: pointer; }
    .btn-edit { background: #38a169; color: white; }
    .btn-delete { background: #e53e3e; color: white; }
    .btn-logout { float: right; background: #a0aec0; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 24px; border-radius: 12px; width: 450px; max-width: 90%; }
    .modal-content input { width: 100%; padding: 8px; margin: 6px 0; border: 1px solid #ccc; border-radius: 6px; }
    .modal-buttons { text-align: right; margin-top: 15px; }
    .modal-buttons button { margin-left: 10px; padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; }
    .save-btn { background: #2b6cb0; color: white; }
    .cancel-btn { background: #cbd5e0; }
    .error { color: #e53e3e; font-size: 0.9rem; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="login-section" class="login-box">
    <h2>🔐 管理员登录</h2>
    <p style="color: #64748b; font-size: 0.9rem;">请输入你的 GitHub Personal Access Token（需要 repo 权限）</p>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <button onclick="login()">验证并进入后台</button>
    <div class="error" id="loginError"></div>
    <p style="margin-top: 15px; font-size: 0.8rem; color: #94a3b8;">
      没有 Token？<a href="https://github.com/settings/tokens" target="_blank">点击这里创建</a>（勾选 <strong>repo</strong> 权限）
    </p>
  </div>

  <div id="main-section" class="container" style="display: none;">
    <button class="btn-logout" onclick="logout()">退出登录</button>
    <h1>⚙️ 插件管理</h1>
    <div class="tabs">
      <div class="tab active" data-file="icecloud_plugins">❄️ IceCloud</div>
      <div class="tab" data-file="plux_plugins">✨ Plux</div>
    </div>
    <button class="btn-add" onclick="openAddModal()">+ 添加插件</button>
    <table>
      <thead>
        <tr>
          <th>插件名称</th>
          <th>版本</th>
          <th>支持 MC</th>
          <th>发布日期</th>
          <th>下载链接</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="plugin-list"></tbody>
    </table>
  </div>

  <!-- 编辑/添加弹窗 -->
  <div id="pluginModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">添加插件</h3>
      <input type="hidden" id="pluginIndex" value="">
      <label>插件名称</label>
      <input type="text" id="pluginTitle" placeholder="例如：IceCloudBan">
      <label>版本号</label>
      <input type="text" id="pluginVersion" placeholder="v1.0.0">
      <label>支持的 MC 版本</label>
      <input type="text" id="pluginMC" placeholder="1.20 - 1.21">
      <label>发布日期</label>
      <input type="text" id="pluginDate" placeholder="2026-06-05">
      <label>下载直链</label>
      <input type="text" id="pluginURL" placeholder="https://raw.githubusercontent.com/...">
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeModal()">取消</button>
        <button class="save-btn" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== 配置 ====================
    const REPO_OWNER = 'IceCloudPlux';
    const REPO_NAME = 'IceCloudPlux.github.io';
    const BRANCH = 'main';
    const DATA_PATH = '_data'; // 存放 JSON 的文件夹

    let currentFile = 'icecloud_plugins'; // 默认
    let pluginsData = [];
    let token = localStorage.getItem('gh_token') || '';

    // ==================== 登录逻辑 ====================
    function login() {
      const inputToken = document.getElementById('tokenInput').value.trim();
      if (!inputToken) return showLoginError('请输入 Token');
      token = inputToken;
      // 验证 Token 是否有效：尝试获取仓库信息
      fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
        headers: { Authorization: `token ${token}` }
      })
      .then(res => {
        if (!res.ok) throw new Error('Token 无效或没有仓库权限');
        // 保存到 localStorage
        localStorage.setItem('gh_token', token);
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-section').style.display = 'block';
        loadPlugins(); // 加载初始数据
      })
      .catch(err => {
        showLoginError(err.message);
      });
    }

    function showLoginError(msg) {
      document.getElementById('loginError').textContent = msg;
    }

    function logout() {
      if (confirm('确定退出登录吗？')) {
        localStorage.removeItem('gh_token');
        token = '';
        location.reload();
      }
    }

    // 页面加载时检查是否已保存 Token
    window.addEventListener('DOMContentLoaded', () => {
      if (token) {
        // 有 token，直接尝试进入后台（可以再验证一次，也可以信任）
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-section').style.display = 'block';
        loadPlugins();
      }
    });

    // ==================== 标签切换 ====================
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentFile = e.target.dataset.file;
        loadPlugins();
      });
    });

    // ==================== 数据加载 ====================
    async function loadPlugins() {
      const filePath = `${DATA_PATH}/${currentFile}.json`;
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}?ref=${BRANCH}`, {
          headers: { Authorization: `token ${token}` }
        });
        if (!res.ok) throw new Error('加载失败，可能文件不存在或 Token 权限不足');
        const data = await res.json();
        const content = atob(data.content.replace(/\n/g, '')); // 解码 base64
        pluginsData = JSON.parse(content);
        if (!Array.isArray(pluginsData)) throw new Error('JSON 格式错误，应为数组');
        renderTable();
      } catch (err) {
        alert('加载插件数据失败: ' + err.message);
        pluginsData = [];
        renderTable();
      }
    }

    function renderTable() {
      const tbody = document.getElementById('plugin-list');
      tbody.innerHTML = '';
      pluginsData.forEach((plugin, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${escapeHtml(plugin.title)}</td>
          <td>${escapeHtml(plugin.version)}</td>
          <td>${escapeHtml(plugin.mc_version)}</td>
          <td>${escapeHtml(plugin.date)}</td>
          <td><a href="${escapeHtml(plugin.download_url)}" target="_blank" title="${escapeHtml(plugin.download_url)}">🔗</a></td>
          <td class="actions">
            <button class="btn-edit" data-index="${index}">编辑</button>
            <button class="btn-delete" data-index="${index}">删除</button>
          </td>
        `;
        tbody.appendChild(row);
      });

      document.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(btn.dataset.index));
      });
      document.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => deletePlugin(btn.dataset.index));
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ==================== 添加/编辑 ====================
    function openAddModal() {
      document.getElementById('modalTitle').textContent = '添加插件';
      document.getElementById('pluginIndex').value = '';
      clearModalFields();
      document.getElementById('pluginModal').style.display = 'flex';
    }

    function openEditModal(index) {
      const plugin = pluginsData[index];
      document.getElementById('modalTitle').textContent = '编辑插件';
      document.getElementById('pluginIndex').value = index;
      document.getElementById('pluginTitle').value = plugin.title;
      document.getElementById('pluginVersion').value = plugin.version;
      document.getElementById('pluginMC').value = plugin.mc_version;
      document.getElementById('pluginDate').value = plugin.date;
      document.getElementById('pluginURL').value = plugin.download_url;
      document.getElementById('pluginModal').style.display = 'flex';
    }

    function clearModalFields() {
      document.getElementById('pluginTitle').value = '';
      document.getElementById('pluginVersion').value = '';
      document.getElementById('pluginMC').value = '';
      document.getElementById('pluginDate').value = '';
      document.getElementById('pluginURL').value = '';
    }

    function closeModal() {
      document.getElementById('pluginModal').style.display = 'none';
    }

    // 保存按钮
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const index = document.getElementById('pluginIndex').value;
      const newPlugin = {
        title: document.getElementById('pluginTitle').value.trim(),
        version: document.getElementById('pluginVersion').value.trim(),
        mc_version: document.getElementById('pluginMC').value.trim(),
        date: document.getElementById('pluginDate').value.trim(),
        download_url: document.getElementById('pluginURL').value.trim()
      };

      if (!newPlugin.title || !newPlugin.version || !newPlugin.download_url) {
        alert('请至少填写名称、版本和下载链接');
        return;
      }

      if (index === '') {
        pluginsData.push(newPlugin);
      } else {
        pluginsData[index] = newPlugin;
      }

      await saveToGitHub();
      closeModal();
    });

    // 删除
    async function deletePlugin(index) {
      if (!confirm('确定删除该插件吗？')) return;
      pluginsData.splice(index, 1);
      await saveToGitHub();
    }

    // ==================== 核心：保存到 GitHub ====================
    async function saveToGitHub() {
      const filePath = `${DATA_PATH}/${currentFile}.json`;
      const newContent = JSON.stringify(pluginsData, null, 2);
      try {
        // 1. 获取当前文件的 sha（必须）
        const getRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}?ref=${BRANCH}`, {
          headers: { Authorization: `token ${token}` }
        });
        if (!getRes.ok) throw new Error('获取文件信息失败');
        const fileData = await getRes.json();
        const sha = fileData.sha;

        // 2. 更新文件
        const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}`, {
          method: 'PUT',
          headers: {
            Authorization: `token ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `更新 ${currentFile} 列表`,
            content: btoa(unescape(encodeURIComponent(newContent))), // 转 base64
            sha: sha,
            branch: BRANCH
          })
        });
        if (!putRes.ok) throw new Error('保存失败');
        alert('✅ 保存成功！网站将在几十秒内更新。');
        renderTable();
      } catch (err) {
        alert('保存失败: ' + err.message);
      }
    }

    // 工具函数：字符串转 base64（支持中文）
    function btoaUTF8(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }
    // 修正上面的 saveToGitHub 中的 content 编码，用 btoaUTF8
    // 重新定义 saveToGitHub 中的编码部分：
    // 在 saveToGitHub 中，将 btoa(unescape(encodeURIComponent(newContent))) 替换为 btoaUTF8(newContent)
    // 为免混乱，直接修改原函数中的那一行：
    // 实际代码中已经使用了 btoa(unescape(encodeURIComponent(newContent)))，等价于 btoaUTF8。
  </script>
</body>
</html>
