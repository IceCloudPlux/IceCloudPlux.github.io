<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IceCloud 系列 · 下载</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e9eef3 100%);
            color: #2d3748;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #3182ce;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #5a6c7d;
            margin-bottom: 2.5rem;
        }
        .download-table {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 0.8rem 1rem;
            color: #718096;
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 2px solid #edf2f7;
        }
        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #f7fafc;
            font-size: 0.95rem;
        }
        .version {
            font-weight: 700;
            color: #2b6cb0;
        }
        .btn-download {
            background: #3182ce;
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.2s;
            display: inline-block;
        }
        .btn-download:hover {
            background: #2b6cb0;
            transform: scale(1.02);
        }
        .loading, .empty {
            text-align: center;
            padding: 2rem;
            color: #718096;
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            color: #a0aec0;
            font-size: 0.85rem;
        }
        footer a { color: #4a5568; font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回官网首页</a>
        <h1>❄️ IceCloud 系列下载</h1>
        <p class="subtitle">选择需要的版本下载，所有插件均兼容 Paper / Spigot / Purpur 等核心。</p>

        <div class="download-table">
            <table>
                <thead>
                    <tr>
                        <th>插件名称</th>
                        <th>版本</th>
                        <th>支持 MC</th>
                        <th>发布日期</th>
                        <th>下载</th>
                    </tr>
                </thead>
                <tbody id="plugin-table-body">
                    <!-- 动态生成 -->
                </tbody>
            </table>
            <div id="status-message" class="loading">加载中…</div>
        </div>
    </div>
    <footer>
        <p>© 2026 IceCloud & Plux Dev · <a href="index.html">返回主站</a></p>
    </footer>

    <script>
        const tbody = document.getElementById('plugin-table-body');
        const statusMsg = document.getElementById('status-message');

        fetch('/_data/icecloud_plugins.json')
            .then(response => {
                if (!response.ok) throw new Error('数据加载失败');
                return response.json();
            })
            .then(data => {
                statusMsg.style.display = 'none';
                if (!Array.isArray(data) || data.length === 0) {
                    statusMsg.textContent = '暂无插件数据，请通过后台添加。';
                    statusMsg.className = 'empty';
                    statusMsg.style.display = 'block';
                    return;
                }
                data.forEach(plugin => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${escapeHtml(plugin.title)}</td>
                        <td class="version">${escapeHtml(plugin.version)}</td>
                        <td>${escapeHtml(plugin.mc_version)}</td>
                        <td>${escapeHtml(plugin.date)}</td>
                        <td><a href="${escapeHtml(plugin.download_url)}" class="btn-download" target="_blank">下载 .jar</a></td>
                    `;
                    tbody.appendChild(row);
                });
            })
            .catch(err => {
                console.error(err);
                statusMsg.textContent = '无法加载插件列表，请刷新重试。';
                statusMsg.className = 'empty';
                statusMsg.style.display = 'block';
            });

        // 简单的防 XSS 函数
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
