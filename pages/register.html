<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - IceCloud & Plux</title>
  <style>
    /* 与登录页样式相同 */
    body { font-family: system-ui, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 360px; }
    h2 { text-align: center; color: #1e293b; margin-bottom: 1.5rem; }
    input { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; }
    .btn { width: 100%; padding: 0.8rem; background: #3182ce; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #64748b; }
    .link a { color: #3182ce; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <h2>📝 注册</h2>
    <input type="text" id="username" placeholder="用户名">
    <input type="password" id="password" placeholder="密码">
    <input type="password" id="password2" placeholder="确认密码">
    <button class="btn" onclick="register()">注册</button>
    <div class="link">已有账号？<a href="login.html">立即登录</a></div>
  </div>
  <script>
    const API_BASE = 'https://icecloud-api.vercel.app';
    async function register() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      if (!username || !password) return alert('请填写完整');
      if (password !== password2) return alert('两次密码不一致');
      const res = await fetch(`${API_BASE}/api/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', username);
        window.location.href = '../premium.html';
      } else {
        alert(data.error || '注册失败');
      }
    }
  </script>
</body>
</html>
