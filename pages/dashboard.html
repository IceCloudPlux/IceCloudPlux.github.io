<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户中心 - IceCloud & Plux</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 2rem auto; }
    .card { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 6px 20px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
    h2 { color: #1e293b; margin-top: 0; }
    .info-row { display: flex; justify-content: space-between; margin: 0.5rem 0; }
    .label { color: #64748b; }
    .value { font-weight: 600; }
    input { width: 100%; padding: 0.6rem; margin: 0.3rem 0; border: 1px solid #e2e8f0; border-radius: 8px; }
    .btn { padding: 0.6rem 1.2rem; background: #3182ce; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 0.5rem; }
    .btn-small { padding: 0.3rem 0.8rem; background: #38a169; color: white; border: none; border-radius: 6px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.6rem; border-bottom: 1px solid #edf2f7; text-align: left; }
    th { background: #f8fafc; color: #475569; font-size: 0.9rem; }
    .nav { text-align: right; margin-bottom: 1rem; }
    .nav a { color: #3182ce; text-decoration: none; margin-left: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="../premium.html">插件商城</a>
      <a href="#" onclick="logout()">退出登录</a>
    </div>
    <div class="card">
      <h2>👤 个人信息</h2>
      <div id="userInfo">加载中...</div>
      <div id="realnameSection" style="margin-top: 1rem;">
        <h4>实名认证（模拟）</h4>
        <input type="text" id="realname" placeholder="真实姓名">
        <input type="text" id="idcard" placeholder="身份证号">
        <button class="btn" onclick="submitRealname()">提交实名</button>
      </div>
    </div>
    <div class="card">
      <h2>🔑 我的许可证</h2>
      <div id="licensesList">加载中...</div>
    </div>
  </div>
  <script>
    const API_BASE = 'https://icecloud-api.vercel.app';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    async function fetchUser() {
      const res = await fetch(`${API_BASE}/api/me`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const user = await res.json();
      if (res.ok) {
        document.getElementById('userInfo').innerHTML = `
          <div class="info-row"><span class="label">用户名：</span><span class="value">${user.username}</span></div>
          <div class="info-row"><span class="label">余额：</span><span class="value">¥${user.balance.toFixed(2)}</span></div>
          <div class="info-row"><span class="label">实名状态：</span><span class="value">${user.realname ? '已认证 (' + user.realname + ')' : '未认证'}</span></div>
        `;
      } else alert(user.error);
    }

    async function fetchLicenses() {
      const res = await fetch(`${API_BASE}/api/licenses`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      const div = document.getElementById('licensesList');
      if (data.length === 0) div.innerHTML = '暂无许可证';
      else {
        let html = '<table><tr><th>产品</th><th>许可证密钥</th><th>获取时间</th></tr>';
        data.forEach(l => {
          html += `<tr><td>${l.productName}</td><td>${l.licenseKey}</td><td>${new Date(l.createdAt).toLocaleString()}</td></tr>`;
        });
        html += '</table>';
        div.innerHTML = html;
      }
    }

    async function submitRealname() {
      const realname = document.getElementById('realname').value.trim();
      const idcard = document.getElementById('idcard').value.trim();
      if (!realname || !idcard) return alert('请填写完整');
      const res = await fetch(`${API_BASE}/api/realname`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ realname, idcard })
      });
      const data = await res.json();
      alert(data.message || data.error);
      fetchUser();
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    fetchUser();
    fetchLicenses();
  </script>
</body>
</html>
